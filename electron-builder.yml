appId: com.pdftoolbox.app
productName: PDF工具箱
directories:
  output: dist-app

win:
  target: nsis
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

extraResources:
  - from: python-dist/pdf_backend/
    to: python/
    filter:
      - "**/*"
  - from: resources/poppler/
    to: poppler/
    filter:
      - "**/*"

files:
  - dist-react/**
  - dist-electron/**
  - "!python/**"
  - "!python-dist/**"
  - "!resources/poppler/**"
  - "!src/**"
  - "!electron/**"
